# Local dev stack: DEBUG/docs/sandbox default ON here so a production-style root `.env`
# does not disable Swagger or payment simulation inside containers. Override with:
#   COMPOSE_DEBUG=false COMPOSE_OPENAPI=false docker compose up -d
x-app-environment: &app-environment
  DATABASE_URL: postgresql+asyncpg://avok_user:avok_pass@postgres:5432/avok_db
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  SECRET_KEY: ${SECRET_KEY:-docker-dev-secret-change-me-32-characters-min}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-docker-dev-jwt-secret-change-32-chars-min}
  PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-docker-dev-payment-webhook-secret}
  DEBUG: "${COMPOSE_DEBUG:-true}"
  ENABLE_OPENAPI_DOCS: "${COMPOSE_OPENAPI:-true}"
  ENABLE_PAYMENT_SANDBOX: "${COMPOSE_SANDBOX:-true}"
  # Optional: MTN MoMo Collection (sandbox host example — use your MTN developer values)
  # MTN_MOMO_BASE_URL: https://sandbox.momodeveloper.mtn.com
  # MTN_MOMO_SUBSCRIPTION_KEY: ""
  # MTN_MOMO_API_USER: ""
  # MTN_MOMO_API_KEY: ""
  # MTN_MOMO_TARGET_ENVIRONMENT: sandbox
  # MTN_MOMO_CURRENCY: EUR

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: avok_user
      POSTGRES_PASSWORD: avok_pass
      POSTGRES_DB: avok_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avok_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    environment:
      <<: *app-environment
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    command: celery -A app.workers.celery_app worker --loglevel=info

  celery_beat:
    build: .
    environment:
      <<: *app-environment
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    command: celery -A app.workers.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
